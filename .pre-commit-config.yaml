repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true
        language: system
        stages: [pre-commit]
        types_or: [ts, tsx, javascript, jsx, json, css]

      - id: typecheck
        name: typecheck
        entry: pnpm tsc --noEmit
        language: system
        stages: [pre-commit]
        types_or: [ts, tsx]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ["--strict", "feat", "fix", "docs", "chore", "refactor", "test", "ci", "build"]
